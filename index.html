<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="container">
        <button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme">
            <i class="fa-solid fa-moon"></i>
        </button>

        <h2>Currency Converter</h2>
        <form>
            <div class="amount">
                <p>Amount</p>
                <input type="text" value="1" placeholder="Enter amount...">
            </div>
            
            <div class="dropdown">
                <div class="from">
                    <p>From</p>
                    <div class="select-container">
                        <img src="https://flagsapi.com/US/flat/64.png" alt="From Flag">
                        <select name="from" aria-label="Convert from currency"></select>
                    </div>
                </div>
                
                <i class="fa-solid fa-arrows-rotate" title="Swap Currencies"></i>
                
                <div class="to">
                    <p>To</p>
                    <div class="select-container">
                        <img src="https://flagsapi.com/IN/flat/64.png" alt="To Flag">
                        <select name="to" aria-label="Convert to currency"></select>
                    </div>
                </div>
            </div>

            <div class="msg-container">
                <div class="msg">1 USD = 80 INR</div>
                <div class="amt-msg">You get 80 INR for 1 USD</div>
            </div>

            <button id="btn">Get Exchange Rate</button>
        </form>
    </div>

    <script src="code.js"></script>
    <script src="script.js"></script>
</body>
</html>
